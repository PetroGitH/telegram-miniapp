<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>CBd'ou First</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
background:black;
color:#22c55e;
font-family:Arial;
text-align:center;
padding:20px;
}

button{
width:100%;
padding:15px;
margin:10px 0;
font-size:16px;
border-radius:10px;
border:none;
background:#22c55e;
color:black;
}
</style>
</head>

<body>

<h2>CBd'OU First</h2>

<div>
Bonjour,<br>
Service livraison CBD, Tabacs & accessoires
prix de la livraion 10€<br>
9h-23h • Précommande 5,30€ offerte
</div>

<button onclick="openMenu()">Menu</button>
<button onclick="openSnap()">Snap</button>
<button onclick="openwhatsapp()">Commande Personnalisé</button>
<button onclick="showCart()">Voir Panier</button>

<script>

const tg = window.Telegram.WebApp;
tg.expand();

let panier = [];
let fraisLivraison = 10;

const produits = [
{nom:"Fleur Cali Gelato", prix:12.50},
{nom:"Fleur Harlequin", prix:11.50},
{nom:"Fleur Super Skunk", prix:11.50},
{nom:"Résine Filter X3", prix:12.50},
{nom:"Résine Bluenana Mousse", prix:12.50}
];

/* MENU PRODUITS */

function openMenu(){
let html = `<h2>Menu CBd'ou First (livraison offert a partir de 50€)</h2>`;

produits.forEach((p,i)=>{
html += `
<div>
${p.nom} - ${p.prix}€
<button onclick="addToCart(${i})">Ajouter</button>
</div>
`;
});

html += `
<button onclick="showCart()">Voir Panier</button>
<button onclick="goHome()">Accueil</button>
`;

document.body.innerHTML = html;
}


function openSnap(){
    window.open("https://www.snapchat.com/add/cbdoufirstfast","_blank");
}

function openwhatsapp(){
    window.open("https://www.whatsapp.com/add/0646354340","_blank");
}
/* AJOUT PANIER */

function addToCart(index){
panier.push(produits[index]);
alert("Produit ajouté au panier");
}

/* AFFICHER PANIER */

function showCart(){

let content = `<h2>Ton Panier</h2>`;
let total = 0;

panier.forEach((item,index)=>{
content += `
<p>
${item.nom} - ${item.prix}€
<button onclick="removeItem(${index})">X</button>
</p>
`;
total += item.prix;
});

content += `<h3>Total : ${total}€</h3>`;

content += `
<button onclick="askAddress()">Commander</button>
<button onclick="openMenu()">Continuer</button>
`;

document.body.innerHTML = content;
}

/* SUPPRIMER */

function removeItem(index){
panier.splice(index,1);
showCart();
}

/* ADRESSE */

function askAddress(){
document.body.innerHTML = `
<h2>Adresse Livraison</h2>s

<input id="nom" placeholder="Nom"><br><br>
<input id="adresse" placeholder="Adresse"><br><br>
<input id="ville" placeholder="Ville"><br><br>
<input id="tel" placeholder="Téléphone"><br><br>

<button onclick="sendOrder()">Confirmer</button>
<button onclick="showCart()">Retour</button>`
};


/* ENVOI TELEGRAM */

function sendOrder(){

const data = {
panier: panier,
livraison: fraisLivraison,
client:{
nom:document.getElementById("nom").value,
adresse:document.getElementById("adresse").value,
ville:document.getElementById("ville").value,
tel:document.getElementById("tel").value
}
};

tg.sendData(JSON.stringify(data));
tg.showAlert("Commande envoyée !");
}

/* HOME */

function goHome(){
location.reload();
}

</script>

</body>
</html>
